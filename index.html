    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 1s ease;
        }

        .container {
            background-color: #1e1e1e;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            max-width: 520px;
            width: 90%;
            transition: all 0.5s ease;
            border: 1px solid #2d2d2d;
        }

        h1 {
            text-align: left;
            margin-bottom: 12px;
            color: #667eea;
            font-size: 2.0rem;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .subtitle {
            text-align: left;
            margin-bottom: 16px;
            color: #b0b0b0;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.1px;
        }

        h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .encouragement {
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.4;
            margin: 2px 0;
            font-weight: 400;
            letter-spacing: 0.1px;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .date-inputs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-start;
        }

        select {
            padding: 14px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #e0e0e0;
            font-size: 1rem;
            min-width: 110px;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
            background-color: #2d2d3e;
        }

        .button-container {
            display: flex;
            justify-content: flex-start;
            margin-top: 12px;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            background-color: #667eea;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        button:hover {
            background-color: #5a6fd8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.3);
        }

        .back-button {
            margin-top: 8px;
        }

        .result-section {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .time-display {
            font-size: 7rem;
            font-weight: 700;
            color: #667eea;
            margin: 2px 0 1px;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .image-container {
            font-size: 11rem;
            margin: 2px 0 2px;
            transition: transform 0.3s ease;
        }

        .image-container:hover {
            transform: scale(1.1);
        }

        .error-message {
            color: #ff6b6b;
            text-align: center;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .copyright {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        /* 动画效果 */
        .input-section,
        .result-section {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .time-display,
        .image-container,
        .encouragement {
            animation: slideInUp 0.6s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .time-display {
            animation-delay: 0.1s;
        }

        .image-container {
            animation-delay: 0.2s;
        }

        .encouragement {
            animation-delay: 0.3s;
        }

        .back-button {
            animation: slideInUp 0.6s ease-out 0.4s both;
        }

        .copyright {
            animation: fadeIn 0.5s ease-in-out 0.5s both;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            h2 {
                font-size: 1.2rem;
            }

            .date-inputs {
                flex-direction: column;
                align-items: center;
            }

            select {
                width: 100%;
                max-width: 200px;
            }

            .time-display {
                font-size: 4rem;
            }

            .image-container {
                font-size: 6rem;
            }

            .encouragement {
                font-size: 1rem;
            }
        }
    </style>
</head>

            40: '#1a1a2e',
            50: '#16213e',
            60: '#0f3460',
            70: '#1a1a2e',
            80: '#16213e',
            90: '#0f3460',
            100: '#0a0a0a'
        };

        // 获取当前日期
        const currentDate = new Date();
        const currentYear = currentDate.getFullYear();
        const currentMonth = currentDate.getMonth() + 1;
        const currentDay = currentDate.getDate();

        // 初始化年份下拉菜单
        const yearSelect = document.getElementById('year');
        for (let i = currentYear; i >= currentYear - 100; i--) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            yearSelect.appendChild(option);
        }

        // 初始化月份下拉菜单
        const monthSelect = document.getElementById('month');
        for (let i = 1; i <= 12; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            monthSelect.appendChild(option);
        }

        // 初始化日期下拉菜单
        function updateDays() {
            const daySelect = document.getElementById('day');
            const year = parseInt(yearSelect.value);
            const month = parseInt(monthSelect.value);
            
            // 清空日期下拉菜单
            daySelect.innerHTML = '<option value="">日</option>';
            
            if (year && month) {
                // 计算当月的天数
                const daysInMonth = new Date(year, month, 0).getDate();
                for (let i = 1; i <= daysInMonth; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = i;
                    daySelect.appendChild(option);
                }
            }
        }

        // 监听年份和月份变化，更新日期下拉菜单
        yearSelect.addEventListener('change', updateDays);
        monthSelect.addEventListener('change', updateDays);

        // 计算按钮点击事件
        document.getElementById('calculateButton').addEventListener('click', function() {
            const year = parseInt(yearSelect.value);
            const month = parseInt(monthSelect.value);
            const day = parseInt(document.getElementById('day').value);
            const errorMessage = document.getElementById('errorMessage');
            
            // 验证输入
            if (!year || !month || !day) {
                errorMessage.textContent = '请完整选择出生日期';
                return;
            }
            
            // 验证日期是否有效
            const birthDate = new Date(year, month - 1, day);
            if (birthDate.getFullYear() !== year || birthDate.getMonth() + 1 !== month || birthDate.getDate() !== day) {
                errorMessage.textContent = '请选择有效的出生日期';
                return;
            }
            
            // 验证日期是否为未来日期
            if (birthDate > currentDate) {
                errorMessage.textContent = '不能选择未来日期';
                return;
            }
            
            // 验证年龄是否超过100岁
            const ageInMilliseconds = currentDate - birthDate;
            const ageInYears = ageInMilliseconds / (1000 * 60 * 60 * 24 * 365.25);
            if (ageInYears > 100) {
                errorMessage.textContent = '年龄不能超过100岁';
                return;
            }
            
            // 计算人生时间（100岁对应24小时）
            const lifeTimeInHours = (ageInYears / 100) * 24;
            const hours = Math.floor(lifeTimeInHours);
            const minutes = Math.round((lifeTimeInHours - hours) * 60);
            const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            
            // 找到对应的年龄段数据
            let ageDataItem = ageData[0];
            for (let i = 1; i < ageData.length; i++) {
                if (ageInYears < ageData[i].age) {
                    ageDataItem = ageData[i - 1];
                    break;
                }
                if (i === ageData.length - 1) {
                    ageDataItem = ageData[i];
                }
            }
            
            // 找到对应的颜色
            let backgroundColor = colorMap[0];
            for (let age in colorMap) {
                if (ageInYears >= age) {
                    backgroundColor = colorMap[age];
                }
            }
            
            // 更新UI
            document.body.style.backgroundColor = backgroundColor;
            document.getElementById('timeDisplay').textContent = ageDataItem.time;
            document.getElementById('imageContainer').textContent = ageDataItem.image;
            document.getElementById('encouragement').textContent = ageDataItem.encouragement;
            
            // 隐藏输入部分，显示结果部分
            document.getElementById('inputSection').style.display = 'none';
            
            // 触发动画效果
            const resultSection = document.getElementById('resultSection');
            resultSection.style.opacity = '0';
            resultSection.style.transform = 'translateY(20px)';
            resultSection.style.display = 'flex';
            
            // 重新触发动画
            setTimeout(() => {
                resultSection.style.transition = 'all 0.5s ease-in-out';
                resultSection.style.opacity = '1';
                resultSection.style.transform = 'translateY(0)';
            }, 10);
            
            // 清空错误信息
            errorMessage.textContent = '';
        });

        // 返回按钮点击事件
        document.getElementById('backButton').addEventListener('click', function() {
            // 显示输入部分，隐藏结果部分
            document.getElementById('resultSection').style.display = 'none';
            
            // 触发动画效果
            const inputSection = document.getElementById('inputSection');
            inputSection.style.opacity = '0';
            inputSection.style.transform = 'translateY(20px)';
            inputSection.style.display = 'block';
            
            // 重新触发动画
            setTimeout(() => {
                inputSection.style.transition = 'all 0.5s ease-in-out';
                inputSection.style.opacity = '1';
                inputSection.style.transform = 'translateY(0)';
            }, 10);
            
            // 重置背景颜色
            document.body.style.backgroundColor = '#121212';
        });
