            gap: 1rem;
            flex-wrap: wrap;
        }

        /* 分享弹窗 */
        .share-modal {
            position: fixed;

            left: 0;

            height: 100%;

            left: 50%;
            transform: translate(-50%, -50%);

            }

                padding: 1.5rem;
            }
        }

        /* 页脚 */
        .footer {
            position: absolute;
            bottom: 1.5rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(0.8rem, 2vw, 0.9rem);

            display: none;
        }

<body>
    <!-- 天空背景层 -->
    <div class="sky-background" id="skyBackground"></div>
    
    <!-- 星星效果 -->

    <!-- 风景前景层 -->
    <div class="landscape-foreground" id="landscapeForeground">
        <svg class="landscape-svg" id="landscapeSvg" viewBox="0 0 1800 200" preserveAspectRatio="none"></svg>
    </div>
    
    <!-- 内容层 -->
    <div class="content">
        <!-- 输入页面 -->
        <div class="page active" id="inputPage">
            <div class="clock-card">

                <p class="subtitle">输入你的出生日期，探索属于你的人生时刻</p>
                
                <!-- 生日输入区 -->
                <div class="birthday-input">
                    <div class="input-group">
                        <label>出生日期</label>
                        <div class="date-inputs">
                            <select class="date-select" id="yearSelect">
                                <!-- 年份选项将通过JS生成 -->
                            </select>
                            <select class="date-select" id="monthSelect">
                                <!-- 月份选项将通过JS生成 -->
                            </select>
                            <select class="date-select" id="daySelect">
                                <!-- 日期选项将通过JS生成 -->
                            </select>
                        </div>
                    </div>

                    <div class="quick-select">

            </div>
        </div>

        <!-- 结果页面 -->
        <div class="page" id="resultPage">
            <div class="clock-card">
                <h1>你现在处在 <span id="lifeTimeDisplay"></span></h1>
                <p class="best-moment">现在正是最好的时刻</p>
                
                <!-- 结果展示区 -->
                <div class="result" id="result">
                    <div class="image-display" id="imageDisplay"></div>
                    <div class="image-name" id="imageNameDisplay"></div>
                    <div class="encouragement" id="encouragementDisplay"></div>
                    
                    <div class="btn-container">
                        <button class="btn back-btn" onclick="goBack()">重新输入</button>
                        <button class="btn share-btn" onclick="openShareModal()">分享结果</button>
                    </div>

            </div>
        </div>
    </div>

    <div class="toast" id="toast">分享文案已复制到剪贴板，欢迎分享！</div>

                <rect x="1250" y="160" width="40" height="40" fill="rgba(30,22,18,0.5)"/>
                <rect x="1450" y="150" width="50" height="50" fill="rgba(30,22,18,0.5)"/>
                <rect x="1550" y="160" width="40" height="40" fill="rgba(30,22,18,0.5)"/>
                <rect x="1650" y="150" width="50" height="50" fill="rgba(30,22,18,0.5)"/>
                <!-- 树木 -->
                <rect x="300" y="140" width="15" height="40" fill="rgba(30,40,20,0.4)"/>
                <rect x="400" y="130" width="15" height="50" fill="rgba(30,40,20,0.4)"/>
                <rect x="700" y="130" width="15" height="50" fill="rgba(30,40,20,0.4)"/>
                <rect x="900" y="140" width="15" height="40" fill="rgba(30,40,20,0.4)"/>
                <rect x="1100" y="140" width="15" height="40" fill="rgba(30,40,20,0.4)"/>
                <rect x="1200" y="130" width="15" height="50" fill="rgba(30,40,20,0.4)"/>
                <rect x="1500" y="130" width="15" height="50" fill="rgba(30,40,20,0.4)"/>
                <rect x="1700" y="140" width="15" height="40" fill="rgba(30,40,20,0.4)"/>
            `,
            "stars": `
                <polygon points="0,200 200,180 400,190 600,170 800,185 1000,165 1200,180 1400,170 1600,185 1800,165 1800,200" fill="rgba(30,22,18,0.6)"/>
                <polygon points="0,200 150,170 300,185 450,165 600,180 750,160 900,175 1050,155 1200,170 1350,155 1500,175 1650,155 1800,170 1800,200" fill="rgba(20,15,12,0.4)"/>
            `
        };

        // 全局变量存储当前计算结果
        let currentResult = {
            age: 0,
            lifeTime: "00:00",
            imageName: "",
            encouragement: ""
        };

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 生成日期选择器选项
            const today = new Date();
            const currentYear = today.getFullYear();
            
            // 生成年份选项
            const yearSelect = document.getElementById('yearSelect');
            for (let year = currentYear; year >= 1900; year--) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year + '年';
                yearSelect.appendChild(option);
            }
            
            // 生成月份选项
            const monthSelect = document.getElementById('monthSelect');
            for (let month = 1; month <= 12; month++) {
                const option = document.createElement('option');
                option.value = month;
                option.textContent = month + '月';
                monthSelect.appendChild(option);
            }
            
            // 生成日期选项
            function generateDays() {
                const daySelect = document.getElementById('daySelect');
                const year = parseInt(document.getElementById('yearSelect').value);
                const month = parseInt(document.getElementById('monthSelect').value);
                
                // 清空现有选项
                daySelect.innerHTML = '';
                
                // 计算当月天数
                const daysInMonth = new Date(year, month, 0).getDate();
                
                // 生成日期选项
                for (let day = 1; day <= daysInMonth; day++) {
                    const option = document.createElement('option');
                    option.value = day;
                    option.textContent = day + '日';
                    daySelect.appendChild(option);
                }
            }
            
            // 初始生成日期选项
            generateDays();
            
            // 监听年月变化，更新日期选项
            document.getElementById('yearSelect').addEventListener('change', generateDays);
            document.getElementById('monthSelect').addEventListener('change', generateDays);
            
            // 检查localStorage中是否有保存的生日
            const savedBirthDate = localStorage.getItem('birthDate');
            if (savedBirthDate) {
                const [year, month, day] = savedBirthDate.split('-').map(Number);
                document.getElementById('yearSelect').value = year;
                document.getElementById('monthSelect').value = month;
                generateDays();
                document.getElementById('daySelect').value = day;
            } else {
                // 默认值1995-01-01
                document.getElementById('yearSelect').value = 1995;
                document.getElementById('monthSelect').value = 1;
                generateDays();
                document.getElementById('daySelect').value = 1;
            }

            // 检查URL参数是否有birthDate
            const urlParams = new URLSearchParams(window.location.search);
            const birthDateStr = urlParams.get('birthDate');
            
            if (birthDateStr) {
                calculateLifeClock(birthDateStr);
            }
        });

        // 设置生日
        function setBirthDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            document.getElementById('yearSelect').value = year;
            document.getElementById('monthSelect').value = month;
            
            // 生成日期选项
            const daySelect = document.getElementById('daySelect');
            daySelect.innerHTML = '';
            const daysInMonth = new Date(year, month, 0).getDate();
            for (let d = 1; d <= daysInMonth; d++) {
                const option = document.createElement('option');
                option.value = d;
                option.textContent = d + '日';
                daySelect.appendChild(option);
            }
            
            document.getElementById('daySelect').value = day;
        }

        // 计算人生时钟
        function calculateLifeClock(birthDateStr) {
            let birthDate;
            if (!birthDateStr) {
                // 从选择器获取日期
                const year = document.getElementById('yearSelect').value;
                const month = document.getElementById('monthSelect').value.padStart(2, '0');
                const day = document.getElementById('daySelect').value.padStart(2, '0');
                birthDateStr = `${year}-${month}-${day}`;
            }
            
            birthDate = new Date(birthDateStr);
            const today = new Date();
            
            // 检查是否选择了未来的日期
            if (birthDate > today) {
                alert('不能选择未来的日期');
                return;
            }
            
            // 检查是否超过100岁
            const ageInYears = (today - birthDate) / (365.25 * 24 * 3600 * 1000);
            if (ageInYears > 100) {
                alert('年龄不能超过100岁');
                return;
            }
            
            // 计算年龄（精确到0.1岁）
            const cappedAge = Math.min(ageInYears, 100);
            const roundedAge = Math.round(cappedAge * 10) / 10;
            
            // 计算人生时间
            const hourOfDay = (cappedAge / 100) * 24;
            const hours = Math.floor(hourOfDay);
            const minutes = Math.round((hourOfDay - hours) * 60);
            const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            
            // 获取对应年龄的意象数据
            const ageKey = Math.min(Math.floor(cappedAge), 100);
            const lifeItem = lifeData[ageKey];
            
            // 更新UI
            document.getElementById('lifeTimeDisplay').textContent = timeString;
            document.getElementById('imageDisplay').textContent = lifeItem.icon;
            document.getElementById('imageNameDisplay').textContent = lifeItem.name;
            document.getElementById('encouragementDisplay').textContent = lifeItem.quote;
            
            // 保存当前结果
            currentResult = {
                age: roundedAge,
                lifeTime: timeString,
                imageName: lifeItem.name,
                encouragement: lifeItem.quote
            };
            
            // 应用天空背景
            applySkyBackground(hourOfDay);
            
            // 切换到结果页面
            document.getElementById('inputPage').classList.remove('active');
            document.getElementById('resultPage').classList.add('active');
            document.body.classList.add('result-page');
            
            // 保存生日到localStorage
            localStorage.setItem('birthDate', birthDateStr);
        }

        // 应用天空背景
        function applySkyBackground(hourOfDay) {
            const skyBg = document.getElementById('skyBackground');
            const stars = document.getElementById('stars');
            const landscapeSvg = document.getElementById('landscapeSvg');
            
            // 找到对应的天空场景
            const scene = skyScenes.find(s => hourOfDay >= s.timeRange[0] && hourOfDay < s.timeRange[1]);
            
            if (scene) {
                // 设置背景渐变
                skyBg.style.background = scene.gradient;
                
                // 处理星星效果
                if (scene.stars) {
                    addStarsEffect();
                } else {
                    removeStarsEffect();
                }
                
                // 更新风景
                updateLandscape(scene.landscape);
            }
        }

        // 添加星星效果
        function addStarsEffect() {
            const stars = document.getElementById('stars');
            stars.innerHTML = '';
            
            // 随机生成120-200个星星
            const starCount = Math.floor(Math.random() * 80) + 120;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                // 大小2-5px随机
                const size = Math.random() * 3 + 2;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                // 透明度0.4-1随机
                star.style.opacity = Math.random() * 0.6 + 0.4;
                // 闪烁动画1.5-4s随机，更快更明显
                const duration = Math.random() * 2.5 + 1.5;
                star.style.animation = `twinkle ${duration}s infinite ease-in-out`;
                star.style.animationDelay = Math.random() * 3 + 's';
                stars.appendChild(star);
            }
        }

        // 移除星星效果
        function removeStarsEffect() {
            const stars = document.getElementById('stars');
            stars.innerHTML = '';
        }

        // 更新风景
        function updateLandscape(landscapeType) {
            const landscapeSvg = document.getElementById('landscapeSvg');
            landscapeSvg.innerHTML = landscapeTemplates[landscapeType] || '';
        }

        // 返回输入页面
        function goBack() {
            document.getElementById('resultPage').classList.remove('active');
            document.getElementById('inputPage').classList.add('active');
            document.body.classList.remove('result-page');
        }

        // 显示Toast提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            if (message) {
                toast.textContent = message;
            }
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 分享结果
        function openShareModal() {
            // 生成分享文案
            const shareContent = generateShareText();
            
            // 复制到剪贴板
            navigator.clipboard.writeText(shareContent)
                .then(() => {
                    showToast('分享文案已复制到剪贴板，欢迎分享！');
                })
                .catch(err => {
                    console.error('复制失败:', err);
                    showToast('复制失败，请手动复制');
                });
        }

        // 生成分享文案
        function generateShareText() {
            const { age, lifeTime, imageName, encouragement } = currentResult;
            // 使用GitHub Pages链接作为分享链接
            const shareUrl = "https://blackiezheng.github.io/life-clock/";
            
            return `✨ 我的人生时钟 · 此刻正好 ✨

我今年 ${age} 岁，人生正走到 ${lifeTime}，正是${imageName}的时刻。

"${encouragement}"

最好的时间，就是现在！快来测测你的人生是几点钟吧 👇

${shareUrl}`;
        }
    </script>
    
    <!-- 页脚 -->
    <footer class="footer">
        <p>© 人生时钟2026 - 现在就是最好的时刻</p>
    </footer>
</body>
